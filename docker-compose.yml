version: "3.9"

services:

  # ── Go gateway ───────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./go
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
      - python-ml       # wait for ML service before starting
    environment:
      PORT:         "8000"
      REDIS_URL:    redis://redis:6379
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/tokenopti?sslmode=disable
      ML_GRPC_ADDR: python-ml:50051
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET:   ${JWT_SECRET}

  # ── Python ML gRPC server (Feature 4+) ───────────────────────────────────────
  python-ml:
    build:
      context: ./python
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    depends_on:
      - chromadb
      - redis
    environment:
      GRPC_PORT:   "50051"
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"    # internal ChromaDB port
      REDIS_URL:   redis://redis:6379
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       tokenopti
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tokenopti || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── ChromaDB (vector store for semantic cache) ────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"    # expose on 8001 to avoid conflict with gateway on 8000
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
  chroma_data:    # persist the vector store across container restarts