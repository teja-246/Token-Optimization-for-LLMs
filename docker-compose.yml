version: "3.9"
services:

  # Go services 
  gateway:
    build:
      context: ./go
      dockerfile: gateway/Dockerfile
    ports: ["8000:8000"]
    depends_on: [redis, postgres, python-ml]
    environment:
      REDIS_URL: redis:6379
      POSTGRES_URL: postgres://aether:secret@postgres:5432/aether
      ML_GRPC_ADDR: python-ml:50051

  # Python ML gRPC server
  python-ml:
    build:
      context: ./python
      dockerfile: Dockerfile
    ports: ["50051:50051"]
    depends_on: [redis, chromadb]
    environment:
      REDIS_URL: redis://redis:6379
      CHROMA_URL: http://chromadb:8000

  # Infrastructure 
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: aether
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]

  chromadb:
    image: chromadb/chroma:latest
    ports: ["8001:8000"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    ports: ["9092:9092"]

  # Dashboard 
  dashboard:
    build: ./dashboard
    ports: ["3000:3000"]
    depends_on: [gateway]